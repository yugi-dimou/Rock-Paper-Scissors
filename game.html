<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
     <div class="container">
    <button id="rock" >Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors" >Scissors</button>
     </div>

     
    <div id="results"></div>
    <div id="choices"></div>
    <div id="score">You: 0 vs Computer: 0 </div>
   
    
    <script>
        const rockBtn = document.getElementById('rock');
        const paperBtn = document.getElementById('paper');
        const scrsBtn = document.getElementById('scissors');
        let humanScore = 0;
        let computerScore = 0;
             

        rockBtn.addEventListener("click",() => {
            const computerChoice=getComputerChoice()
             playRound('rock',computerChoice)});
        paperBtn.addEventListener("click",() => {
            const computerChoice=getComputerChoice()
            playRound('paper',computerChoice)});
        scrsBtn.addEventListener("click",() => {
             const computerChoice=getComputerChoice()
             playRound('scissors',computerChoice)});

        const resultsDiv = document.querySelector('#results');
        const scoreDiv = document.querySelector('#score');
        const choicesDiv = document.querySelector('#choices');

        const s1 = 'rock';
        const s2 = 'paper';
        const s3 = 'scissors';
        function getComputerChoice(){
            let p = Math.random(); 
            if (p<1/3){
                console.log(s1);
                return s1;
               
            } else if (p<2/3) {
                console.log(s2);
                return s2; 
                    
            } else {
                console.log(s3);
                return s3;
              }
             }
     
        
        function playRound(playerSelection,computerChoice) {
           
         if(humanScore<5 && computerScore<5){
             
            if (playerSelection===computerChoice){
                resultsDiv.textContent = "Tie game!";
                  scoreDiv.textContent = ` You : ${humanScore} vs Computer : ${computerScore}`;
                  choicesDiv.textContent = ` You choose ${computerChoice} and Computer chooses ${computerChoice}`
            } else if (playerSelection===s1 && computerChoice===s2){
                computerScore++;
                resultsDiv.textContent = "You lost, paper beats rock.";
                scoreDiv.textContent = ` You : ${humanScore} vs Computer : ${computerScore}`;
                choicesDiv.textContent = `You choose ${s1} and Computer chooses ${computerChoice}`
            } else if(playerSelection===s1 && computerChoice===s3){
                humanScore++;
                resultsDiv.textContent = "You won, rock beats scissors";
                 scoreDiv.textContent = ` You : ${humanScore} vs Computer : ${computerScore}`; 
                 choicesDiv.textContent = `You choose ${s1}  and Computer chooses ${computerChoice}`

            } else if(playerSelection===s2 && computerChoice===s1){
                humanScore++;
                resultsDiv.textContent = "You won,paper beats rock.";
                  scoreDiv.textContent = ` You : ${humanScore} vs Computer : ${computerScore}`;
                  choicesDiv.textContent = `You choose ${s2} and Computer chooses ${computerChoice}`

            } else if(playerSelection===s2 && computerChoice===s3){
                computerScore++;
                resultsDiv.textContent = "You lost, scissors beats paper";
                  scoreDiv.textContent = ` You : ${humanScore} vs Computer : ${computerScore}`;
                   choicesDiv.textContent = `You choose ${s2} and Computer chooses ${computerChoice}`
               
            } else if(playerSelection===s3 && computerChoice===s1){
                computerScore++;
                resultsDiv.textContent = "You lost, rock beats scissors"
                  scoreDiv.textContent = `You : ${humanScore} vs Computer : ${computerScore}`;
                   choicesDiv.textContent = `You choose ${s3} and Computer chooses ${computerChoice}`
            } else if(playerSelection===s3 && computerChoice===s2){
                humanScore++;
                resultsDiv.textContent = "You won, scissors beats paper"
                scoreDiv.textContent = `You : ${humanScore} vs Computer : ${computerScore}`;
                 choicesDiv.textContent = `You choose ${s3} and Computer chooses ${computerChoice}`

            }
        }
        if (humanScore===5){
            resultsDiv.textContent = "Congratulations, you won the game";
            
        }else if (computerScore===5){
            resultsDiv.textContent = "You lost...."
        }
    }
    
        
    </script>
</body>
</html>
